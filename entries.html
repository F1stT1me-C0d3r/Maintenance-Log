<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <script>
    if ('serviceWorker' in navigator)
      navigator.serviceWorker.register('/sw.js');
  </script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <script src="entries.js" defer></script>
  <title>Maintenance Entries</title>
</head>
<body>
  <nav class="navbar">
    <ul>
      <li><a href="index.html"><span class="material-symbols-outlined">home</span></a></li>
    </ul>
  </nav>

  <section class="entries-container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>Maintenance Log</h2>
      <div style="display:flex; gap:8px;">
        <button id="removeSelectedBtn">Remove Selected</button>
        <button id="downloadBtn">Download as TXT</button>
      </div>
    </div>
    <input type="text" id="entrySearch" placeholder="Filter by make, model, year, or plate..." />
    <ul id="entriesList"><li class="loading">Loading...</li></ul>
  </section>
</body>
</html>
